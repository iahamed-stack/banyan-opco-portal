            </div>
          </div>
          <p style={{fontSize:14,color:"#666",marginBottom:26,lineHeight:1.8,maxWidth:720}}>{sec.desc}</p>
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,minmax(0,1fr))",gap:24}}>
            {sec.groups.map(g=>(
              <div key={g.title}>
                <div style={{fontSize:11,fontWeight:700,color:sec.accent,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10,display:"flex",alignItems:"center",gap:7}}>
                  <div style={{width:2,height:12,background:sec.accent,borderRadius:1}}/>{g.title}
                </div>
                {g.items.map(item=><DocCard key={item.title} item={item} accent={sec.accent}/>)}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ASK AI */}
      {page==="ask"&&(
        <div style={{maxWidth:780,margin:"0 auto",padding:"32px 24px"}}>
          <Crumb label="Resource Assistant"/>
          <h2 style={{fontSize:22,fontWeight:700,color:"#1a1a1a",margin:"0 0 4px"}}>Resource Assistant</h2>
          <div style={{fontSize:13,color:"#888",marginBottom:20}}>Ask about tools, discounts, policies, guilds, onboarding, workshops, or security</div>

          {aiError&&(
            <div style={{background:"#fff3cd",border:"1px solid #ffc107",borderRadius:8,padding:"12px 16px",marginBottom:14,fontSize:13,color:"#856404",lineHeight:1.7}}>
              ⚠️ API key not configured. Open <code>index.html</code> in a text editor, find the line <code>const API_KEY = "";</code> near the top, and add your Anthropic API key from <a href="https://console.anthropic.com/settings/keys" target="_blank" style={{color:"#856404"}}>console.anthropic.com</a>.
            </div>
          )}

          <div ref={chatRef} style={{background:"#fff",border:"1px solid #e8e8e8",borderRadius:10,padding:"18px",minHeight:300,maxHeight:420,overflowY:"auto",marginBottom:10,display:"flex",flexDirection:"column",gap:14}}>
            {msgs.map((m,i)=>(
              <div key={i} style={{display:"flex",gap:10,justifyContent:m.role==="user"?"flex-end":"flex-start",alignItems:"flex-end"}}>
                {m.role==="assistant"&&<div style={{width:28,height:28,borderRadius:"50%",background:GL,border:`1px solid ${G}22`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:11,color:G,fontWeight:700}}>B</div>}
                <div style={{maxWidth:"76%",background:m.role==="user"?G:"#f6f6f4",color:m.role==="user"?"#fff":"#222",borderRadius:m.role==="user"?"14px 14px 3px 14px":"14px 14px 14px 3px",padding:"11px 15px",fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{m.text}</div>
                {m.role==="user"&&<div style={{width:28,height:28,borderRadius:"50%",background:G,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:10,color:"#fff",fontWeight:700}}>You</div>}
              </div>
            ))}
            {loading&&(
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <div style={{width:28,height:28,borderRadius:"50%",background:GL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:G,fontWeight:700}}>B</div>
                <div style={{background:"#f6f6f4",borderRadius:"14px 14px 14px 3px",padding:"11px 15px",fontSize:12,color:"#aaa"}}>
                  {["●","●","●"].map((d,i)=><span key={i} style={{animation:"pulse 1s infinite",animationDelay:`${i*0.2}s`,marginRight:3}}>{d}</span>)}
                </div>
              </div>
            )}
          </div>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            <input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!loading&&send()}
              placeholder="Ask about discounts, onboarding, tools, guilds, policies…"
              style={{flex:1,padding:"10px 14px",border:"1px solid #ddd",borderRadius:7,fontSize:13,outline:"none"}}/>
            <button onClick={()=>send()} disabled={loading||!inp.trim()} style={{background:G,color:"#fff",border:"none",padding:"10px 18px",borderRadius:7,fontSize:13,fontWeight:600,cursor:loading?"not-allowed":"pointer",opacity:loading||!inp.trim()?0.4:1}}>Send</button>
          </div>
          <div style={{background:"#f8f8f6",border:"1px solid #eaeaea",borderRadius:8,padding:"14px 16px"}}>
            <div style={{fontSize:11,fontWeight:600,color:"#aaa",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Suggested questions</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {SUGGESTIONS.map(s=>(
                <button key={s} onClick={()=>!loading&&send(s)} style={{background:"#fff",border:"1px solid #ddd",borderRadius:20,padding:"6px 13px",fontSize:12,color:"#555",cursor:"pointer",transition:"all 0.1s"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=G;e.currentTarget.style.color=G;}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor="#ddd";e.currentTarget.style.color="#555";}}>
                  {s}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

      <div style={{background:"#1a1a1a",padding:"18px 32px",textAlign:"center",marginTop:"4rem"}}>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.25)",letterSpacing:"0.04em"}}>
          © 2026 Banyan Software · OpCo Resource Portal · Internal Use Only · <a href="mailto:marketplace@banyansoftware.com" style={{color:"rgba(255,255,255,0.25)"}}>Feedback</a>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Portal/>);
</script>
</body>
</html>
